# ============================================================
# TIES Storage Service — Application Configuration
# ============================================================

# ------------------------------------------------------------
# Service Identity
# ------------------------------------------------------------
spring.application.name=storage-service
server.port=8083

# ------------------------------------------------------------
# Kafka — Consumer
# Consumes validated blocks from validation-service
# ------------------------------------------------------------
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=storage-service-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false

# ------------------------------------------------------------
# Kafka — Topics
# capture.blocks.stored      = validation-service output
# capture.blocks.confirmed   = storage-service output
# ------------------------------------------------------------
kafka.topic.stored=capture.blocks.stored
kafka.topic.confirmed=capture.blocks.confirmed

# ------------------------------------------------------------
# PostgreSQL
# Stores block metadata, session state, device records
# ------------------------------------------------------------
spring.datasource.url=jdbc:postgresql://localhost:5432/mapping_db
spring.datasource.username=mapping_user
spring.datasource.password=mapping_secret_password
spring.datasource.driver-class-name=org.postgresql.Driver

# ------------------------------------------------------------
# JPA
# ------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ------------------------------------------------------------
# MongoDB
# Stores raw frame image data
# ------------------------------------------------------------
spring.data.mongodb.host=localhost
spring.data.mongodb.port=27017
spring.data.mongodb.database=mapping_images
spring.data.mongodb.username=mongo_user
spring.data.mongodb.password=mongo_pass

# ------------------------------------------------------------
# Actuator
# ------------------------------------------------------------
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ------------------------------------------------------------
# Logging
# ------------------------------------------------------------
logging.level.com.ties.storage=DEBUG
logging.level.org.springframework.kafka=INFO
logging.level.org.apache.kafka=WARN
logging.level.org.springframework.data.mongodb=INFO
# ============================================================
# TIES Validation Service — Application Configuration
# ============================================================

# ------------------------------------------------------------
# Service Identity
# ------------------------------------------------------------
spring.application.name=validation-service
server.port=8082

# ------------------------------------------------------------
# Kafka — Consumer
# Consumes validated blocks from ingestion-service
# ------------------------------------------------------------
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=validation-service-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false

# ------------------------------------------------------------
# Kafka — Topics
# capture.blocks.validated = ingestion-service output
# capture.blocks.stored    = validation-service output
# ------------------------------------------------------------
kafka.topic.validated=capture.blocks.validated
kafka.topic.stored=capture.blocks.stored

# ------------------------------------------------------------
# PostgreSQL
# Used to verify device registration during validation
# ------------------------------------------------------------
spring.datasource.url=jdbc:postgresql://localhost:5432/mapping_db
spring.datasource.username=mapping_user
spring.datasource.password=mapping_secret_password
spring.datasource.driver-class-name=org.postgresql.Driver

# ------------------------------------------------------------
# JPA
# ------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ------------------------------------------------------------
# Actuator
# Health check endpoint for Docker
# ------------------------------------------------------------
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ------------------------------------------------------------
# Logging
# ------------------------------------------------------------
logging.level.com.ties.validation=DEBUG
logging.level.org.springframework.kafka=INFO
logging.level.org.apache.kafka=WARN
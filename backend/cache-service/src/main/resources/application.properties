# ============================================================
# TIES Cache Service — Application Configuration
# ============================================================

# ------------------------------------------------------------
# Service Identity
# ------------------------------------------------------------
spring.application.name=cache-service
server.port=8084

# ------------------------------------------------------------
# Kafka — Consumer
# Consumes confirmation events from storage-service
# ------------------------------------------------------------
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=cache-service-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false

# ------------------------------------------------------------
# Kafka — Topics
# capture.blocks.confirmed = storage-service output
# ------------------------------------------------------------
kafka.topic.confirmed=capture.blocks.confirmed

# ------------------------------------------------------------
# Redis
# Block metadata cached here for fast downstream access
# ------------------------------------------------------------
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=redis_pass
spring.data.redis.timeout=2000ms

# ------------------------------------------------------------
# Cache
# TTL controls how long a block stays in Redis before
# expiring automatically
# 3600 seconds = 1 hour
# ------------------------------------------------------------
cache.block.ttl.seconds=3600

# ------------------------------------------------------------
# Actuator
# ------------------------------------------------------------
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ------------------------------------------------------------
# Logging
# ------------------------------------------------------------
logging.level.com.ties.cache=DEBUG
logging.level.org.springframework.kafka=INFO
logging.level.org.apache.kafka=WARN
logging.level.org.springframework.data.redis=INFO
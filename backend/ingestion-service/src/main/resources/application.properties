# ============================================================
# TIES - Ingestion Service Configuration
# ============================================================

# Service Identity
spring.application.name=ingestion-service
server.port=8081

# ============================================================
# KAFKA CONFIGURATION
# This tells our service where Kafka is running
# and how to behave as a consumer
# ============================================================

# Address of our Kafka container
spring.kafka.bootstrap-servers=${KAFKA_BROKER:localhost:9092}

# Consumer Group ID
# All instances of this service share this group ID
# Kafka uses this to distribute messages between instances
spring.kafka.consumer.group-id=ingestion-service-group

# What to do when this service starts for the first time
# earliest = read all messages from the beginning of the topic
# latest = only read new messages that arrive after startup
spring.kafka.consumer.auto-offset-reset=earliest

# Tell Kafka what format our messages arrive in
# We receive JSON strings from the phone
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# Kafka topic names
# These must match exactly what the phone sends to
kafka.topics.capture-blocks=capture.blocks
kafka.topics.acknowledgements=capture.acknowledgements
kafka.topics.telemetry=device.telemetry

# ============================================================
# POSTGRESQL CONFIGURATION
# This tells our service where the database is
# ============================================================

spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:mapping_db}
spring.datasource.username=${POSTGRES_USER:mapping_user}
spring.datasource.password=${POSTGRES_PASSWORD:mapping_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool settings
# How many database connections to keep open simultaneously
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# JPA Settings
# validate = check that our Java models match the database tables
# but don't change anything in the database
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ============================================================
# ACTUATOR CONFIGURATION
# Health check endpoints for Docker and monitoring
# ============================================================

# Expose health and info endpoints
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# ============================================================
# LOGGING CONFIGURATION
# Controls what gets printed to the console
# ============================================================

logging.level.root=INFO
logging.level.com.ties=DEBUG
logging.level.org.springframework.kafka=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
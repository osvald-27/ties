# ============================================================
# TIES Orchestration Service — Application Configuration
# ============================================================

# ------------------------------------------------------------
# Service Identity
# ------------------------------------------------------------
spring.application.name=orchestration-service
server.port=8085

# ------------------------------------------------------------
# Kafka — Consumer
# Consumes confirmation events from storage-service
# ------------------------------------------------------------
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=orchestration-service-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false

# ------------------------------------------------------------
# Kafka — Topics
# capture.blocks.confirmed = storage-service output
# session.ready            = orchestration-service output
#                            triggers analytical tier
# ------------------------------------------------------------
kafka.topic.confirmed=capture.blocks.confirmed
kafka.topic.session.ready=session.ready

# ------------------------------------------------------------
# PostgreSQL
# Reads and updates mission session state
# ------------------------------------------------------------
spring.datasource.url=jdbc:postgresql://localhost:5432/mapping_db
spring.datasource.username=mapping_user
spring.datasource.password=mapping_secret_password
spring.datasource.driver-class-name=org.postgresql.Driver

# ------------------------------------------------------------
# JPA
# ------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ------------------------------------------------------------
# Actuator
# ------------------------------------------------------------
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ------------------------------------------------------------
# Logging
# ------------------------------------------------------------
logging.level.com.ties.orchestration=DEBUG
logging.level.org.springframework.kafka=INFO
logging.level.org.apache.kafka=WARN
